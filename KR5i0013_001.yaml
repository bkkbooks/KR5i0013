body:
  text: 凡受持之士先須盥漱焚香嚴整衣冠洗心滌慮至誠禮念聖號畢然後調聲正氣字字句句分明念誦心慕身行自然災消福集一切祈求無不感應焚香拜畢跪而啓曰寂然不動感而遂通太音希聲叩之則應恭焚道德寶香虔誠上啓供養太上彌羅無上天妙有玄眞境渺渺紫金闕太微玉淸宫無極無上聖廓落發光明寂寂浩無宗玄範總十方湛寂眞常道恢漠大神通穹蒼眞老妙圓淸靜智慧辨才至道至尊三界師混元祖無爲聖主四生慈父高天上聖大慈仁者十號圓滿萬德周身無量度人拔生死苦眾聖之王諸佛之師太上開天執符御厯含眞體道金闕雲宫九穹厯御萬道無爲通明大殿昊天金闕玉皇大天尊玄穹高上帝九拜大羅天上朱景宫中尊居十極之高體乾出治位正三才之上御德行權寒肅暑火平六氣而咸甯萬國旦明宵晦駕六龍而統治十華司善惡予奪之柄照臨赫奕定功過顯微之迹感應昭彰號令雷霆迅除邪祟大悲大願大聖大慈日宫太陽鬱儀帝君威光布德如來慈輝朱日天尊四拜大羅天上七寶苑中秉金水之精華姿容綽約本坤儀之柔順瑞相端嚴開玉燭之神光家沾淸澤煉紫房之靈藥人錫長年雖朓朒而眞體罔虧任滿盈而明輝不溢考核諸仙之升降主持司祿之權衡命玉𡚱而滋甘露催開萬谷春容咨靑女而降玄霜收歛千倉秋實化被人天恩敷三界大悲大願大聖大慈月府太陰結璘皇君寶光幽照如來妙果素月天尊四拜西天竺國大智光中眞空妙相法王師無上玄元天母主金光爍處日月潛輝寶杵旋時鬼神失色顯靈踪於塵世衞聖駕於閻浮眾生有難若稱名大士尋聲來救苦大悲大願大聖大慈聖德巨光天后摩利攴天大帝圓明道姥天尊四拜紫微宸極勾陳天宮九光寶苑之中五炁玄都之上體元皇而佐司玄化總兩極而共理三才主持兵革之權衡廣推大德統御星辰之躔次無失常經上象巍峩眞元恢漠大悲大願大聖大慈勾陳上宫天皇大帝四拜大羅天闕紫微星宫尊居北極之高位正中天之上佛號金輪熾盛道稱玉斗玄尊璇璣玉衡齊七政總天經地緯日月星㝛約四時行黃道紫垣萬象宗師諸天統御大悲大願大聖大慈萬星教主無極元皇中天紫微北極大帝四拜靑華長樂界東極妙巖宫七寶方騫林九色蓮花座萬眞環拱内百億瑞光中玉淸天寶尊應化玄元始浩刼垂慈濟大千甘露門妙道眞身紫金瑞相隨機赴感誓願無邊大悲大願大聖大慈十方化號普度眾生億億刼中度人無量尋聲赴感太乙救苦天尊靑玄九陽上帝四拜九天應元府無上玉淸王化形而滿十方談道而趺九鳳三十六天之上閱寶笈考瓊書千五百劫之先位正眞權大化手舉金光如意宣說玉樞寶經不順化作微塵發號疾如風火以淸淨心而宏大願以智慧力而伏諸魔總司五雷運心三界羣生父萬靈師大聖大慈至皇至道九天應元雷聲普化天尊四拜混元六天傳法教主修眞悟道濟度羣迷普惠眾生消除災障八十二化三教祖師大慈大悲救苦救難三元都總管九天遊奕使左天罡北極右垣大將軍鎭天助順眞武靈應福德衍慶仁慈正烈協運眞君治世福神玉虛師相玄天上帝金闕化身蕩魔天尊四拜高上神霄府凝神煥照宫會元始祖炁以分眞應妙道虛無而開化位乎九霄之上統理諸天總乎十極之中宰制萬化宣金符而垂光濟苦施惠澤而覆育兆民恩溥乾元仁敷浩劫大悲大願大聖大慈玉淸眞王南極長生大帝統天元聖天尊四拜金天弻教太華流光修眞學道於峩嵋煉性昇玄於碧漢制伏天魔主持下界之刀兵調燮陰陽典攝眞空之水火七關總制八海朝元太白順從乎躔度瑤池邀赴乎蟠桃西陲教主昭化神王大悲大願大聖大慈紫微碧玉宫太一大天帝保制劫運天尊四拜紫府洞天靑陽化炁掌握諸仙之籍開闡法門之始撰著黃庭與道德經相爲表裏提衡閬苑佐神寶君宻以維持靑雲結葢紫炁聯城大悲大願大聖大慈靑陽起派紫府東華帝君輔元立極天尊四拜黃芽得道白雪成眞配水火於一炁之中運陰陽於三華之頂無無虛寂𣺌𣺌凝玄胎息刀圭孰悟本來之體嬰兒姹女誰知靈府之臺度眾生於慾海之波錫蕊珠於雲霄之表洪願不窮好生常念大悲大願大聖大慈正陽繼派終南洞天帝主飛行救劫天尊四拜玉淸内相金闕選仙化身爲三教之師掌法判五雷之令黃梁夢覺忘世上之功名寶劒光騰掃人間之妖怪四生六道有感必孚三界十方無求不應黃鶴樓中留聖蹟玉虛殿内煉丹砂存芝像於山崖顯仙蹤於古洞衍法門之香火作玄嗣之梯航大聖大慈大仁大孝開山啓教元應祖師天雷上相靈寶眞人純陽主派警化孚佑帝君興行妙道天尊四拜不驕帝境玉眞慶宮現九十八化之行藏顯億千萬種之神異飛鸞開化於在在如意救劫以生生至孝至仁功存乎儒釋道教不驕不樂職盡乎天地水官功德難量威靈莫測大悲大願大聖大慈九天輔元開化主宰司籙職貢舉眞君七曲靈應保德宏仁大帝談經演教消劫行化更生永命天尊四拜太上神威英文雄武精忠大義高節淸亷協運皇圖德崇演正掌儒釋道教之權管天地人才之柄上司三十六天星辰雲漢下司七十二地土壘幽酆秉註生功德延夀丹書執定死罪過奪命黑籍考察諸神監制羣仙高證妙果無量度人至靈至聖至上至尊三界伏魔大帝關聖帝君大慈大願大聖大仁眞元顯應昭明翊漢天尊四拜白雪丹霄黃芽舊蹟文章星斗老君授三五飛步之玄機玉局籙符漢祖傳正一斬邪之妙旨惟名登於紫府常掌握乎雷霆伐疵癘於靑城滅怪妖於下界巍巍蕩蕩妙妙玄玄作太極而生兩儀聚三華而朝五炁隨機格物閑邪存誠大悲大願大聖大慈祖師地祗教主三十代天師虛靖宏悟妙道張眞君天官内相文華無極眞人碧霄演教天尊四拜無上玄功玉樞妙果昭靈應於十方運慈心於一切開壇啓教賴洪力之護持濟困扶危建殊勳於烜赫受玉淸元始之誥命贊九天應元之神功仁風遐暢宇宙藹春日之和祥光遍覆天人瞻慈雲而集道極無爲玄通莫測大悲大願至神至仁左輔元化無上極尊天仙二祖玉樞右宰宏教眞君四拜道融三教理會百家髫齡篤孝子之眞誠壯嵗成忠臣之奇節艱難跋涉拱衞潛龍慷慨都俞擒縛孽虎得神禹之遺法平步可以凌空授玄祖之心傳飛劎還能蔽日綱維百世大儒者之宗風表率羣賢闡玄門之要訣雙修道法結小隱於黃山兩現神功留異形於白嶽利人濟物寶鼎鎔金飮酒賦詩珠編屑玉風流奇士節義神仙首領南宫協司東岱掌風雷之號令統丁甲天兵握陰陽之樞機管水火鬼卒大慈大願至聖至仁斗府總管雷部侍郎玉宸校書少宰丹霄簽判仙卿隆恩宏濟眞君四拜虛靜天師頌曰人之一性湛然圓寂涉境對動種種皆慾一念失正卽是地獄敬誦斯文髮立汗下煨燼心火馴服氣馬旣以自鏡且告迷者太上老君每月十眞齋戒日凡遇初一日念無量太華天尊初八日念玄上玉晨天尊十四日念度仙上聖天尊十五日念玉寶皇上天尊十八日念好生度命天尊二十三日念玄眞萬福天尊二十四日念太靈虛皇天尊二十八日念太妙至極天尊二十九日念眞皇洞神天尊三十日念玉虛明皇天尊以上十日乃諸天下降觀人善惡察人功過之辰若能皈依遵行堅持齋戒可免劫獄之苦及超度先亡功德不可思議重刋道藏輯要太上感應篇東吳惠棟定宇箋註太上者最上之稱春秋正義曲禮曰太上貴德春秋傳曰太上以德撫民又云太上有立德經傳言太上者皆謂五帝以前上聖之人真誥甄命授曰太上者道之子孫審道之本洞道之根是以爲上淸眞人爲老君之師陶宏景注云此卽謂太上高聖玉晨大道君也爲太極左眞人中央黃老君之師又云昔太上以德教老子是以老子道經云太上下知有之顧懽堂誥堂誥四卷卽老子義疏以爲太古上德之人是也是書乃修眞者述太上之㫖而爲之當在玉鈐經易内戒赤松子經河圖記命符諸書中皆晉以前書抱朴子所述而此篇言道戒尤關日用尚德者用茲無悔乃君子之光易背義者以此思憂禮實小人之福易是以昔人表而出之名之曰感應夫倡而不和動而不隨中必有不全者矣故必愼所以感之者新序有感必有應自然之道也太上曰禍福無門惟人自召春秋傳閔子騫之言無門言同一門出入也虞仲翔注易以坤爲鬼禍乾爲神福乾神坤鬼神爲福鬼爲禍是知禍屬陰福屬陽陽爲善陰爲惡故禍福以類相從字皆從示示神事也說文天者神穀梁然則禍福皆天也而不知轉移之者人也福兮禍伏老子禍與福隣荀子吉凶同域憂喜聚門鶡冠子降之者天召之者人禍重於地福輕於羽羽叶戸有福不及禍來速我韓非子自作難活天作猶可善惡之報如影隨形此言感應之理也影者形動所生虎嘯而谷風起龍興而景雲屬擊庭鐘於外而黃鍾應於内物類之相感精神之相應若響之應聲影之象形劉向新序吉凶之於善惡亦猶是也作善降之百祥作不善降之百殃書積善之家必有餘慶積不善之家必有餘殃易聖人之言感應禍福速哉漢書是以天地有司過之神依人所犯輕重以奪人算算減則貧耗多逢憂患抱朴子案易内戒及赤松子經及河圖記命符皆云天地有司過之神隨人所犯輕重以奪其算算減則人貧耗疾病屢逢憂患算盡則人死又對俗篇云上天司命之神察人過惡其行惡事大者司命奪紀小過奪算合二文觀之司過卽司命之屬也是以禮記祭法曰王爲羣姓立七祀曰司命曰中霤曰國門曰國行曰泰厲曰戸曰竈鄭康成注云小神居人之間司察小過作譴告者七祀皆主察小過故總謂之司過其或謂之司命者七祀首司命故也人皆惡之惡去聲下流乃君子弗居多言爲詩人所畏玷汝南之月旦許邵事先注難除六朝赦令並云洗除先注葢當日鄉論淸議必有記注之目也殊洛邑之井疆書終身不齒禮豈非三代之直道尚在於斯民四㐫之不才載謠於人口乎范蔚宗贊刑禍隨之官刑鬼禍罹外刑者金木訊之罹内刑者陰陽食之莊子宥人之行事夫各有所當矣兵在其頸國語焉避害也左傳天奪之魄孰逃威也左傳吉慶避之易道以乾爲善爲祥爲福爲祿坤爲喪爲惡爲殺爲亂仲翔注易聖人贊易扶陽抑陰以陽爲君子陰爲小人積惡之徒與陰同類故吉慶避之陽稱吉稱慶也仲翔注易云陽吉陰㐫又云陽稱慶也惡星災之嵗在豕韋萇洪識蔡侯之禍星出婺女裨竈知晉國之㐫春秋類對賦葢德隆則晷星星隆則晷德漢書惟天時與人事相參斯六賊與五殘並㑹六賊五殘皆星名德之不修禳之何益終逮於喪亡而已算盡則死抱朴子曰凡人之受命得夀自有本數所稟本多則紀算難盡而遲死若所稟本少而所犯者多則紀算速盡而早斃是則占平公之疾無過十年驗伯有之亡不能五稔國語左傳算之盡也何日之有又有三台北斗神君在人頭上錄人罪惡奪其紀算武陵太守星傳云三台一名天柱上台司命中台司中下台司祿周禮疏案天官書文昌宫第四星曰司命五曰司中六曰司祿是司命卽三台三台卽文昌也祭法王立七祀一曰司命皇侃禮疏侃六朝人以爲文昌第四星非也司命有二楚辭有大司命少司命七祀之司命乃少司命也在虛北見星經封禪書荊巫祠司命漢律祠䃾司命皆謂少司命也別詳下註其大司命乃文昌第四星卽星傳之上台矣張君房雲笈七籖曰北斗九星第五丹元星天之北斗君主命籙籍上總九天諸籙中統鬼神簿目下領學眞兆民命籍諸天諸地無不總統陶宏景眞誥曰鬼官北斗君乃是北斗之考官此鬼一官又隷九星之精上屬北晨玉君耳又云鬼官別有北斗君以司生殺葢上天北斗有所司察故鬼官亦置此職是北斗神君亦有二也竊謂顏超所遇斗君亦鬼官所置者非必天上星辰也事載搜神記漢趙壹謝友人書曰收之於斗極還之於司命則三台北斗之說其來久矣又有三尸神在人身中太上三尸中經曰人之腹中各有三尸九蟲爲人大害常以庚申之日上造天帝以記人之造罪分毫錄奏欲絶人生籍減人祿命令人速死上尸名彭倨在人頭中中尸名彭質在人腹中下尸名彭矯在人足中玉樞經注云上尸名靑姑中尸名白姑下尸名血姑抱朴子案易内戒等書言身中有三尸三尸之爲物雖無形而實魂靈鬼神之屬也欲使人早死此尸當得作鬼自放縱遊行饗人祭酬是以每到庚申之日輒上天白司命道人所爲過失每到庚申日輒上詣天曹言人罪過眞誥協昌期曰凡庚申之日是尸鬼競亂精神躁穢之日也不可與夫妻同席及言語面會當淸齋不寢警備其日遣諸可欲太上律科曰庚申日北帝開諸罪門通諸鬼神訴訟羣魔併集以司天下兆人及諸異類善惡之業隨其功過多少賞勞謫過毫分不遺月晦之日竈神亦然淮南子萬畢術曰萬畢人姓名見龜策列傳葢八公之軰有術一卷漢涿郡高誘所註見淮南外篇今亡竈神晦日歸天白人罪御覽陸龜䝉祀竈解曰竈鬼以時錄人功過上白於天當祀之以祈福祥封禪書李少君以祠竈見上如湻曰祠竈可以致福孫子嚴祭竈請比隣陰子方臘日晨炊而竈神形見因以黃羊祀之段成式酉陽雜爼曰竈神名隗又姓張名單夫人字卿忌有六女皆名察洽察一作祭洽一作治常以月晦日上天白人罪狀大者奪紀小者奪算故爲天帝督使下爲地精己丑日日出卯時上天禺中下行署此日祭得福其屬神有天帝嬌孫天帝大夫天帝都尉天帝長兄硎上童子突上紫官君太和君玉池夫人等一曰竈神名壤子也雜五行書曰竈神名禪禪單字相近葢禪讀爲單莊子曰竈有髻司馬彪曰髻竈神也李軌音吉杜公瞻引五經異義曰竈姓蘇名吉利婦姓王名博頰字子郭衣黃衣司馬彪曰著赤衣爿大如美女夜披髮從竈中出知其名呼之可除凶惡凡人有過大則奪紀小則奪算抱朴子曰但有惡心而無惡迹者奪算若惡事而損於人者奪紀紀算之說其來遠矣初學記引河圖曰河圖洛書共四十五篇非今所謂河洛也黃帝曰凡人生一日天地賜算三萬六千賜紀二十聖人得三萬六千七百二十凡人得三萬六千一紀主一嵗聖人加七百二十又云孝順二親得算二千天司祿所表事賜算中功抱朴子曰紀者三百日也段成式亦云算者三日也孫思邈亦云李昌齡傳云紀之爲說一云十二年此俗說一云三百日算之爲說一云百日段成式云一云一日棟謂人上夀百二十依河圖之說算主百年紀主二十年合於上夀則算爲一日近之其過大小有數百事欲求長生者先須避之抱朴子曰諸應奪算者有數百事不可具論玉鈴經曰欲求仙者當以忠孝友悌仁信爲本若行不修而但求元道無益也又云立功爲上除過次之是道則進非道則退薰蕕不同器邪正不並容目不兩視而明耳不兩聽而聰荀子不揆於是非則有多歧之患不審於進退則有羸角之凶易是以君子務以道爲折衷也不履邪徑野廬氏禁野之橫行徑踰者爲防奸也周禮君子之所由有義路有禮門唯其行之卓卓故能履之坦坦若大道甚夷而人偏好徑老子射邪趨疾鄭康成語橫奔失路楚詞一蹉足時終身莫贖矣不欺暗室室有屋漏天有旦明審爾動靜及爾出王明叶芒王如字事無幽而不顯行無隱而不彰是以顏回不改容於夜浴蘧瑗不變節於宵行叶杭劉晝新論夫唯瑩靈臺之方寸自能止虛室之吉祥也莊子積德累功無憤憤之志者無昭昭之明無綿綿之事者無赫赫之功大戴禮葢德不積不崇功不累不廣積土成山風雨興焉積水成淵蛟龍生焉積善成德而神明自得聖心備矣荀子慈心於物慈心卽不忍之心物兼人物言毛之在躬拔之則痛周書指之在臂齕之則啼莊子身且如此物亦宜然愛本之爲慈推之爲恩施諸民則爲仁及於物則爲愛皆心爲之也心和則氣和氣和則形和漢書仁者之夀考美意之延年荀子非其驗歟忠孝友悌臣之事君無逃於天地子之愛親不可解於心莊子兄弟者其初一人之身也蘇洵語臣忠子孝兄友弟悌所謂天之經也地之義也民之行也雖然吾竊謂君子之道四教孝爲先天下之大戒二莊子安親爲始孝經緯曰求忠臣必於孝子之門春秋傳曰子之能仕父教之忠未有孝而不忠者也書曰孝乎惟孝友于兄弟未有孝而不弟者也漢制使天下誦孝經選吏舉孝亷荀爽對策而當時人才特盛忠孝成俗非崇本之效歟正已化人表曲則影邪源淸則流潔其身不正而能化及天下者未之有也素書曰釋已而教人者逆正已而化人者順是故正已而物正大人之事也矜孤恤寡藐孤之意曾不知悲恤緯之心每懷無告是以君子之絜矩務在恤孤先王之啓監至於屬婦惟施恩於不報其利溥哉知發政之必先爲惠大矣敬老懷幼貴老謂其近於父也慈幼謂其近於子也禮舉斯心而加諸彼乃謂推恩己不欲而勿施人方能行恕葢老安少懷之志天子非有餘匹夫非不足惟力行何如耳昆蟲草木猶不可傷昆眾也古文作䖵從二虫蟲之總名也帝舜使伯禹掌草木鳥獸名其官曰朕虞本鄭氏尚書注葢以萬物爲一體也草木有生而無知昆蟲有知而無義本荀子而皆秉天地之大德而生是故蟲舍蚳蝝山不槎蘖魯語聖王以之立政啓蟄不殺方長不折禮君子以之律身宜憫人之凶惟狂未聞克念書遂入禽門法言怙惡莫有悛容二字見左傳流爲凶族二字見左傳第思饑年之多暴非天殊於降才夜氣之牿亡是豈人之本性孟子是故作凶事爲凶人左傳常人之所畏也賢人之所惡也聖人之所悲也樂人之善君子已能亦樂人之能也已善亦樂人之善也大戴禮龎士元拔十失五猶足爲歎孔文舉去短稱長尚堪同調俱見夲傳唯秉彝之良不異斯懿德之好無私鶴之在陰自相鳴和易蘭之同臭易豈有差池左傳宏長道業其在斯乎濟人之急救人之危枯魚在肆仰升斗之無由莊子窮鳥入懷望彈丸而知畏趙一事物猶如此人何以堪雖君子之固窮論語相賙爲義唯善人之在患弗救不祥晉語昔人所云飢食而寒衣墨子生死而肉骨左傳非仁心爲質者漢書曷能如此哉見人之得如己之得見人之失如己之失有虞之君使天下貢善其治天下見人有善若己有善見人有過如己有過此有虞氏盛德也皆見尸子夫舜之立心如此所以和五典而無違教賔四門而無凶人亦思舜何人也予何人也有爲者亦若是而已不彰人短葢失數美左傳人之恒情是故接物之道不貴其能察貴其能容君子賢而能容罷音皮知而能容愚博而能容淺粹而能容雜荀子惟有容而後知德之大也惟能容而後知量之遠也不衒己長衒說文作眩行而買也人各有能物各有伎深則藏淺則露舒張貿物劉逵語行而且買說文市人皆掉臂而不顧史記乃知一得之不足稱偏長之不足恃也吾聞良賈深藏若虛君子盛德容貌若愚史記矧伎能非全才尤當宏此遠謨也遏惡揚善易大有之詞遏猶匿也火天之象無所不照大有之義無所不包君子法卦象以察物而分善別惡人無遁情師卦義以容人而遏匿褒揚人皆喻志公羊此順天休命之道也說本王弻推多取少推吐雷反曲禮曰分母求多雲笈七籤老君崇百藥曰推多取少是一藥讓德之主也爭亂之端也魯國男兒尚知棃小孔融安邱博士豈識羊肥甄字當由欲者不多是以取之忘少本世說知此者可以息爭可以興讓受辱不怨老君崇百藥曰受辱不怨是一藥以白造緇曰辱鄭氏儀禮注身不潔白而隨以汙辱吕覽宜其怨矣雖然有義辱者有勢辱者犯分亂理辱由中出謂之義辱詈侮捽搏辱自外至謂之勢辱荀子義辱爲辱勢辱不足辱何怨之有夫惟不怨是以寡怨受寵若驚高位實疾僨漢書作顚厚味實腊毒厚味喩重祿以上見周語子家懷思於魯人亦謀之公子懼選於秦天所贊也左傳葢賢者寵至而益戒不足者爲寵驕晉語雖危而無咎者其三之乾乾乎以恐而致福者其初之虩虩乎易施恩不求報曲禮曰太上貴德其次務施報謂太上之世施而不思報其次謂三王之世施則望報也老君崇百藥曰施不望報是一藥此太上之行也天地有覆載之恩父母有鞠育之恩然物不答施於天地子不謝生於父母者三國志以天地之量大父母之情深也太上具天地父母之心奪之不以爲損予之不以爲益愛之不自以爲仁利之不自以爲利所謂下知有之者也其次奪之知損予之知益愛之爲仁利之爲義所謂親之譽之者也七經小傳與人不追悔易曰有孚惠心勿問元吉葢爲益之大莫大於信爲惠之大莫大於心王弻注益而有孚惠而以心何悔之有唯不追悔是以無悔吉又何之矣之訓往所謂善人禹稱善人左傳爲無惡也論語朱注行惡見樂爲惡未熟至其惡熟自見受苦行善見苦爲善未熟至其善熟自見受樂成實論然則季氏之惡已熟漢書五行志其中必苦國語東平之善最樂後漢書亦在乎熟也孟子人皆敬之人無有不善善人者民之望也君子見而改容小人聞而革面敬人者人恒敬之盛德之所致也天道佑之天道無親常與善人郎顗引易云亦見太公金匱及說苑金人銘善人天地之紀也左傳是以自天祐之吉無不利也繫辭福祿隨之福者天所錫也祿者人所受也好德錫福書令德受祿詩天之道也眾邪遠之遠于萬切義厭伊葉切不惠德勝不祥漢書鬼不神於有道老子妖不作於守常左傳乃知庶疫剛癉剛卯中文見兩漢書不在逐鬽古魅字之毅巳支音亥已而在制行之直方也毅巳支大剛卯也辟邪之印以玉爲之見說文神靈衞之神者聰明正直而一者也唯仁是福唯德是依皆見左傳昔者三苖之亂天命殛之夏后受之天神降而輔之司祿益食而民不飢司金益富而國家實司命益年而民不夭見隨巢子是其事也所作必成同心爲善善必成同心爲惡惡必成何休公羊註名將成而物敗之者僞也有所欲而天必從者誠也至德之貴何往不遂至德之榮何往不成徐幹中論神仙可冀抱朴子曰覽諸道戒無不云欲求長生者必欲積善立功慈心於物恕已及人仁逮昆蟲樂人之吉愍人之苦苦疑當作凶謂之凶也賙人之急救人之窮手不傷生口不勸禍見人之得如己之得見人之失如己之失不自貴不自譽不疾妬勝己不嫉謟陰賊如此乃爲有德受福於天所作必成求仙可冀也以上抱朴子文王陟而在上詩殁爲神明賈誼傳黃帝合而不死史記去抱朴子曰覽諸道戒無不云欲求長生者必欲積善立功慈心於物恕已及人仁逮昆蟲樂人之吉愍人之苦苦疑當作凶謂之凶也賙人之急救人之窮手不傷生口不勸禍見人之得如己之得見人之失如己之失不自貴不自譽不疾妬勝己不嫉謟陰賊如此乃爲有德受福於天所作必成求仙可冀也以上抱朴子文王陟而在上詩殁爲神明賈誼傳黃帝合而不死史記去而上仙莊子豈虛語哉欲求天仙者當立一千三百善欲求地仙者當立三百善天數十二左傳言一千三百非其次三當爲二字之誤也抱朴子曰聞之先師云仙人或昇天或住地要於俱長生玉鈴經鈴疑作鉿曰人欲地仙當立三百善欲天仙當立千二百善若有千一百九十九善而忽復中行一惡則盡失前善乃當復更起善數耳以上皆抱朴子眞誥甄命授曰積功滿千雖有過故得仙功滿三百而過不足相補者子仙功滿二百者孫仙子無過又無功德籍先人功德便得仙所謂先人餘慶其無志多過者可得富貴仙不可冀也苟或非義而動背理而行背音佩自此至殺龜打蛇皆承上大小數百事而言此統言之下乃析言之種樹蓄養不見其益有時而大磨礱砥礪不見其損有時而盡積德累行不知其善有時而用棄義背理不知其惡有時而亡枚乘語然則何以辨之曰福生有基禍生有胎納其基絶其胎禍何自來同上以惡爲能忍作殘害以苛爲察以切爲明以刻爲忠以計多爲功以聚歛爲良此中行氏之所以先亡也新序淮南子韓商之道其用民也殘其養民也狹施之於亂世可以利事平則受其禍矣馮班昔人譬之廓革者廓之大則大矣裂之道也淮南子陰賊良善伯宗晉之善人而三卻害之郄宛楚之良也而無極讒之陰賊之禍烈矣然長魚僞訟而卻氏尸朝進胙興謗而費氏族滅俱見左傳天怨不旋日人怨不旋踵詩外傳信哉暗侮君親萬石俯嘗君食固西漢之家風子通跪讀父書實東吳之遺教顧悌唯敬誠之兼盡斯忠孝之無虧故戒以勿欺本純臣之事見其不是陳忠肅語乃逆節之階名義大防安得不於此謹之慢其先生先生者先醒也譬猶俱醉而獨先發也故世有先醒者有後醒者有不醒者新書少年喜謗前軰新進每狎老成此何異醉而新寐殊無足與言者乎鹽鐵論叛其所事牛馬維婁維繫馬婁繫牛委巳者也委飼已者而柔焉柔服也公羊傳而况人乎納棄妻而論前壻之惡買僕虜而毀故主之暴抱朴子斧鉞刀鋸之民周語猶知鄙夷而不屑之甯有輕狡反覆負恩徼利如漢之吕奉先晉之劉牢之者誑諸無識矜不能而教不及長者之行也若朝三而暮四朝四而暮三名實不虧而能御眾狙之喜怒豈所以籠羣愚者哉莊子子其愚我也子其聾我也子其盲我也列子善乎楞嚴經之語曰眩惑無識死後當墮無間矣謗諸同學君子之與人也面誦其短而退稱其長後漢書葢責善爲朋友之道故不厭箴規如内不相訓而外相謗非親睦也家語况明友之薄而已不得厚揚友之辱而已不得榮此一舉而兩失也戰國策記曰君子絶交不出惡聲交絶猶然况投分之友乎虛誣詐僞詩云神之弔矣詒爾多福民之質矣日用飲食夫使機械日生而姦僞並起上下相遁神奚自而降福乎有起信險膚之族則高后崇降弗祥盤庚有譸張爲幻之民則嗣王罔或克夀無佚是故有道之世人醕工龎商樸女重淮南子上下皆有嘉德至治馨香感於神明矣日知錄虛而爲盈或承之羞誣善之人其辭必游魏懲變詐垂爲定律魏分漢律爲詐僞律見晉書刑法志無載爾僞心勞日拙攻訐宗親宗有遠近同此淵源親有親疎無非瓜葛二字出後漢志及獨斷所當致其敬愛處以忠誠若因一事之乖片言之忤遂翻然易志倐爾甘心甚者加之攻擊發彼陰私以此施諸宗是自蹷其本也左傳施諸親是自翦其翼也左傳㨗則非功敗爲有喪南史反義悖德莫大於是剛强不仁齒之堅也六十而盡相靡也戰國策天爲剛德猶不干時左傳彊毅果敢而甚不仁知伯之所以滅其宗也晉語昔人謂不仁之質勝則彊猛爲禍梯人物志信哉李昌齡傳曰孔子以剛爲近仁太上以剛爲不仁言豈相戾哉聖人所取之剛剛於理者也太上所戒之剛剛於氣者也天錫此注卽周子剛有善惡之說很戾自用迷者不問路溺者不問遂徑隧亡人好獨荀子是以君子不鏡於水而鏡於人鏡於水見面之容鏡於人則知吉與凶墨子不是師法而好自用譬之是猶以盲辨色以聾辨聲舍亂妄無爲矣荀子羸角之羊窮於進退焚巢之鳥終見號咷雖狠戾何益耶是非不當向背乖宜懷迷罔之疾者行非以爲是視白以爲黑天地四方無不倒錯列子若猶是人也亦道其常而已好人所惡而惡人所好則拂性適以取災厚其所薄而薄其所厚則處家適以致亂是非向背之間可不審哉虐下取功謟上希㫖君子之所當撫恤者下也所當匡正者上也以不教殺人謂之虐以不善先人謂之謟荀子浚民膏以課最豈是良臣揆主意以扶非抱朴子定非俊物一事增制永爲故事之循一語聳惥養成在上之惡蠧國病民誰之咎歟受恩不感念怨不休先軫未報秦施致罹狄難子常惟思舊怨遂覆荆尸左傳葢艾人必豐是爲有禮艾報也周語舊惡不念惟在古賢論語是故大德滅小怨左傳寬身之仁也禮小怨置大德周語刑戮之民也禮輕蔑天民天民出王制天生民而立之君使司牧之勿使失性左傳故職曰天職爵曰天爵民曰天民秋官司民獻民數於王王拜受之登於天府重之至矣撫我則后虐我則讎書天之愛民甚矣豈其使一人肆於民上而棄天地之性必不然矣左傳擾亂國政利不什不易業功不百不變更是以古之人君謀事必就祖發政占古語重作事也韓安國語乃或求治太急用人太驟東坡語以聰明亂其舊章愆忘易其成憲譬烹鮮而撓之治絲而棼之害家凶國所傷實多陸象先嘗謂天下本自無事但庸人擾之爲煩耳唐書本傳賞及非義刑及無辜善爲國者賞不僣而刑不濫賞僣則懼及淫人刑濫則懼及善人不僣不濫成湯之所以獲天福也左傳賞無功謂之亂晏子罰無罪謂之酷素書亂則舉枉錯直而民不服枉錯直上酷則頗類放紛左傳而民無所措手足殺人取財方言曰殺人而取其財曰惏力南反傾人取位殺人取財心計之臣也傾人取位傾危之士也心計之臣酷以濟其貪傾危之士奸以行其險此傳所云以讒慝貪惏事君而多殺不辜怨讎已多其能免乎誅降戮服聖人不得已而用兵所以除草竊靖邊疆也當其助虐侵淩罪當誅戮苟泥首歸誠宜推心置腹令反惻子自安後漢書弄潢池之兵諒非民志烈崑岡之火亦豈君心眞西山語古人云誅降者殃及三世又云禍莫大於殺已降史記爲將者思之貶正排賢人臣莫難於無妬而進賢戰國策是故進賢達能謂之大夫大夫之爲言大扶進人者也白虎通蔽公者謂之昧隱良者謂之妬妬昧之人國家有之則爲薉孼荀子仁人見之屏諸四夷莊氏之酒酸抑有由也韓非子宋之沽酒者有莊氏其酒常美或使往沽其狗齕人使者不敢往於是莊氏之酒酸夫人臣而齕有道之士此亦猛狗也東閭之行乞豈徒然哉說苑曰東閭子常富貴而後乞人問之曰公何爲如是曰吾自知吾嘗相六七年未嘗薦一人也淩孤逼寡青燈嫠婦有子未孩蓬室孀妻遺男始齕列子無中人之恒產卽天下之窮民帝王且欲施仁行路豈能無惻夫因利而弱人之孤虐人之媰崔子玉淸河王誄云惠於媰孀丁度集韻媰嫠也是之謂賤丈夫人如此者狗猪不食其餘王莽弃法受賂古文尚書呂刑曰五過之疵維貨維求馬融曰求請賕也漢法盜律有受賕枉法之科漢律盜篇蕭何所撰罪至死又贜吏子孫不得察舉唐睿宗太極元年制官典主司枉法贜一匹已上並先決一百而改元及南郊赦文大辟罪已下咸赦除之官典犯贜不在此限宋初南郊大赦十惡故劫殺及官吏受贜者不原是知亂政同位商后作其丕刑盤庚貪以敗官夏書訓之必殺夏書曰昏墨賊殺貪以敗官爲墨見左傳三代以來罔不由此道者日知錄彼黷貨厲民之徒卽不顧天理獨不畏國法耶以直爲曲以曲爲直直者刑所不加曲者法所不宥有如王子爭囚而州犂上下伯輿坐獄而范宣左右類對賦遂使直如矢者周内以深文曲如鈎者虧除於漏網卽絶請寄而憑臆斷五聽已頗倘受獄貨而府辜功庶尤必報入輕爲重廷尉者天下之平也壹傾天下用法皆爲之輕重民安所錯其手足乎漢書是以古之人郵罰麗事呂刑決獄折中韓詩外傳所以卽天倫也王制如生議而予之死比漢書下刑傅以上刑書輯小過成大辟加詆欺違明詔薛宣傳聖王不以怒加刑天罰不極其在是乎見殺加怒死者不可復生刑者不可復屬古之聖王或下車而泣之或徹樂以悲之誠不忍之至也乃成獄報囚輒加嚴暴家語祥刑之意安在乎孔子曰用法一也思仁恕則樹德加嚴暴則樹怨可不愼乎家語知過不改知善不爲易繫辭曰善不積不足以成名惡不積不足以滅身小人以小善爲無益而弗爲也以小惡爲無傷而弗去也故惡積而不可掩罪大而不可解易曰荷校滅耳凶自罪引他他湯何切卻克與韓厥分謗高允爲崔浩引罪古人直諒不以生死易其辭夫犯禍對曹乃其自取不思痛心刻骨反欲虛引他人以圖自免究之良奥之家句本鄭氏禮注雖遭毒手二字見晉書貫盈之罪終伏歐刀句見後漢書亦何益之有耶壅塞方術墨子遊齊道逢日者中行在晉夢值巫皋會方士於旗亭禇先生問楚人於東市司馬季主皆能探抽冥賾叅驗人區范蔚宗語若乃斥以卑汙比之賤簡日者列傳至使知星㝛者無望覆衣諺曰知星㝛衣不覆索廷篿者幾爲奪糈音所亦通人之蔽句本君山而盛德之累也宋忠賈誼前事可鑒者矣訕謗聖賢宋本作賢聖抱朴子作聖賢仲任小子偏成問孔之篇論衡九卷孫况老師獨有賤儒之論見非十二子篇亦思非聖無法經有科條非聖無法見孝經漢律亦有是條何休注公羊曰無尊上非聖人不孝者斬首梟之訾讏蔽明傳垂大戒訾毀賢讏譽惡見管子且朝士之毁何傷日月羣兒之謗空笑蚍蜉昌黎詩祇見其不知量也古文多祇通侵淩道德有物混成先天地生曰道德者得也道生萬物有得獲有故名德道生之德畜之長之育之成之熟之養之覆之是以萬物莫不尊道而貴德下士聞道大笑之此侵淩之所由至也抱朴子作傷殘道士義亦相近戮鼓琴之于吉孫策謬誅捕屈膝之左慈曹瞞無識葢異術之士亦有不可誣者也射飛逐走發蟄驚棲塡穴覆巢傷胎破卵宋齊邱化書曰禽獸蟲蟻之於人也何異有巢穴之居有夫婦之配有父子之性有死生之情烏反哺爲仁隼憫胎爲義蜂有君爲禮羊跪乳爲智雉不再接爲信若夫焚其巢穴非仁也奪其親愛非義也以斯爲享非禮也教民殘暴非智也使萬物懷疑非信也夫羶臰之慾不止殺害之機不已羽毛雖無言必狀我爲貪狼之與封豕鱗介雖無知必名我爲長鯨之與巨虺也何爲自安焉得不恥吁直疑自古無君子願人有失願人有得未必得也願人有失未必失也而臧否分矣今有燎者於此一人奉水將灌之一人操火將益之功皆未至雖然吾嘉彼奉水者之意而惡夫操火者之心也墨子願人有失亦猶是耳毁人成功老君說百病曰敗人成功是一病陳湯斬郅支班超定西域厥功茂矣而匡衡一言卒從吏議李邑盛毁遂去其妻小人之好議論不樂成人之美如此哉然史稱偉績高此兩人人笑李匡至今齒冷毀人者安在耶危人自安勢有難全者則瀕人於危而弗顧非憎人也自安之道在乎此也豈知天道好還危人適以自危越絶書曰危人自安君子弗爲抱朴子曰背仁義之正途苟危人以自安者凶人也減人自益孔子言不祥有五損人而益己一不祥也新序盜愛其室不愛異室故竊異室以利其室賊愛其身不愛人故賊人以利其身墨子損人而益己乃盜賊之心也吾聞釜皷滿者人概之人滿者天概之管子可不懼哉以惡易好好讀爲和好之好數世之與國一朝而背之盟心之宻友轉眼而讐之非惑於利卽搆於讒獨不思同好而弃惡左傳福之基也與惡而弃好左傳禍之胎也迨乎兵已交而莫解怨已積而難排後雖悔之不可及已左傳以私廢公老君說百病曰以私亂公是一病倉頡之作書也自營者營一作環謂之厶厶古私字背私者謂之公公厶之相背也倉頡已知之矣韓非子是故君子不以一己之私情妨天下之公理忘私者直也漢書公爾忘私滅私者德也尚書以公滅私害公者逆也詩毛傳君子不以私害公廢公者慝也托公濟私者賊也竊人之能蔽人之善人有能而吾竊之可恥孰甚焉人有善而吾蔽之不祥莫大焉且而不聞攘善者無續范甯穀梁注續謂繼嗣揚善者有後乎班固贊以伯宗之賢而遇讒三卻攘輦者之言也穀梁以張湯之酷而珥貂七葉揚兒寬之奏也漢書形人之醜訐人之私李傳以醜爲醜行因戲而形容人之醜行戲而虐矣因爭而攻發人之陰私爭而亂矣狀之逼眞令人失笑能無折終身之福乎揭之無遺令人掩耳能無啓殺身之禍乎耗人貨財富無經業則貨無常主史記有耗之者也手編葉子金葉子格戲始于周后產盡於今朝太白詩黃金逐手快意盡昨日破產今朝貧巧笑市門資窮於夜合齊和公事惟匪人之是比易豈之子之無良治彼罷民應坐周官之嘉石方之碩鼠宜傳漢室之爰書離人骨肉骨肉相愛讒賊間之而父子兄弟相傾也淮南子子翬謀桓魯隱危豎牛奔仲叔孫卒費忌納女楚建走伊戾坎盟宋痤死江克造蠱太子殺息夫作姦東平誅皆自小覆大繇踈陷親可不懼哉可不懼哉漢書侵人所愛貨不好不能爲禍周語古人以不貪爲寶左傳譬之烟雲之過眼百鳥之感耳非不欣然接之去而不復念也東坡虞叔之劒枑魋之誅左傳玩之者豈非喪志求之者適啓戎心助人爲非佐雝者嘗佐鬬者傷周語故君子成人之美不成人之惡成人之惡是佐鬬也無乃傷乎且小人爲不善未必披猖惟有助之者則同惡相濟如市賈焉左傳幾於無忌憚矣漢律名有功有意助人爲非功意俱惡漢書抽腸釁皷顏氏家訓非不幸也逞志作威其爵彌高其志益下淮南子志安可逞威如之吉反身之謂也易若依勢作威書志乃逞矣語曰君子得時如水小人得時如火說苑傲不可長禮其能久耶辱人求勝勝人者有力自勝者强老子况辱人以求之乎屈王孫於胯下困張祿於厠中非愚則妄易不云乎無平不陂無往不復吾見多陵人者皆不在矣石經左傳敗人苖稼水有曲壅曲防壅泉王法所懲田卒汙萊詩人所嘆葢良苖肥稼上可薦宗廟下以厚民生重之至也若種稻而奪諸水戰國策牽牛以蹊人田左傳此何異草宅而禽饗也周書犯禁受罰固其宜耳破人婚姻媒氏掌萬民之判氷人合二姓之歡雖兩喜何惜兩譽兩喜見莊子戰國策曰周地賤媒爲其兩譽也譽音餘然非耦必多喪耦皆見左傳所當愼之始也若夫初聘而强委禽左傳已歸而嗟分鏡本事詩非辱於强暴卽奪於亂離更有絲蘿將結一語而致參商伉儷方諧片辭而興雀角皆害倫虧義不可之甚者也苟富而驕孝經曰滿而不溢所以長守富也家敦而富志高而揚戰國策天奪之鑒左傳鬼瞰其室矣漢書史鰌言富而不驕者鮮矣驕而不亡者未之有也左傳富斯驕驕斯亂亂斯亡禮記苟免無恥成仁取義烈士之壯心寡廉鮮恥人臣之大戒三代以來其風甚卓後世不知此義而文章之士多護李陵智計之家或稱譙叟此說一行則國無守臣人無植節反顏事讐行若狗彘而不知媿也何怪乎五代之長樂老序平生以爲榮滅廉恥而不顧者乎日知錄認恩推過恩非已出而妄仞之仞古文認見漢書過實在我而强推之任德不任怨已掠其名誰執其咎鄭贊竊恐居德者居德出易德之涼也避怨者怨之府也涼德怨府皆見左傳嫁禍賣惡共仲殺子般而歸獄於僕人公羊傳孟德行小斛而借死於主者曹瞞傳古來機械變詐之事甚深而難測然孟氏之賊曹氏之姦天下莫不聞者抗輈食糟之禍慶父抗輈經而死不在其身則在其子孫可不畏哉沽買虛譽羊質虎皮覩草則悅見豺則戰法言魚質龍文遭水卽喜遇獺卽悲抱朴子名實之辨也先軰謂好名與好利其相去不遠葢沽名亦以爲利也然虛名一敗萬事瓦裂其害有甚於謀利者故荀子謂盜名不如盜貨包貯險心書難壬人畏孔壬壬者象人懷妊之形說文包藏凶惡之人也壬人之行潛姦隱智厚貌深情其藏之也如含沙伏弩雖明者不能然也然猶罔也義見淮南其發之也則入肉貫胸雖强者無不弊也其術之工雖殺數十百人而主名不立甚矣其險也挫人所長䕶己所短良相之愛才也一藝必庸小善卒錄君子之制行也瑕不掩瑜瑜不掩瑕夫誇己之長乃挫人長揚人之短始䕶己短謂幽蘭不可佩服艾盈要蘇糞壤以充幃眾芳蕪穢離騷賢士無名徒工謠言豕不善是揜如見肺肝卒亦何益之有哉乘威迫脅威者權也勢也權勢之所在爲福固易爲禍亦烈逐君側之惡人志父豈能無罪趙鞅事見公羊左傳鞅曰志父無罪徙雒都之黎庶太師莫怨然臍董卓至於武安請魏其之田破石奪五百之婦兩漢書皆跋扈鴟張不義之甚者也縱暴殺傷殺人者死傷人者刑荀子古之道也乃有人頭羅剎殿上蒼鷹任雕而惡少爲爪牙五代史召名禍猾吏與從事史記芟夷若草唐詩殺人如草不聞聲論報如屠漢書豈知天道神明人不可獨殺也嚴嫗語師古曰言多殺人者已亦當死虞定安之家門不增一口虞詡王温舒之族滅豈踰三冬漢法踰冬則赦戒之戒之孟子無故翦裁聖人爲衣服適身體和肌膚而足矣非榮耳目而觀愚民也今則不然女工作文采男工作刻鏤其爲衣服不爲身體皆爲觀好單財勞力單與殫同畢歸之於無用皆見墨子此賈誼所謂百人作之不能衣一人欲天下之無寒不可得矣非禮烹宰燕以四膳養用三牲禮之所在烹宰所不廢也至於平居當遵約儉重卿魚飱趙盾終能免禍公羊大夫玉食必害而家書况乎多列庶羞兼羅珍怪二字出公羊舍靈龜而觀朶頤易弱之肉而强之食韓文鄭子公之指唯堪染鼎左傳趙稚長之腹止用監厨後漢書揆之古人無故不殺之禮不已悖乎左道中有屠牛爲業者其人不食犬豕惟日宰太牢血糢糊懸肉格三字出周禮注莫敢誰何者此無他禁之之法寛也案淮南子說山篇曰殺罷牛可以贖良馬之死莫之爲也殺牛必亡之數以必亡贖不必死未能行之者矣高誘註云牛者所以植穀養民之命是以王法禁殺牛民犯禁殺之者誅故曰必亡之數然則漢法殺牛與殺人同科也故其時人不敢犯今法輕於漢而欲使植穀之牛不入屠伯之手烏可得哉李叔則愛牛說曰肉牛者十之三革牛者十之三角牛者十之四天下於是無全牛矣此論可謂痛切散棄五穀席間之飯仲堪噉而無餘晉書盤中之餐公垂咏而彌重李紳詩試看盤中餐粒粒皆辛苦葢食乃民天貨惡弃地其有太倉之粟屢見因陳畝首之糧或多遺滯豈知儉嵗之饑康四穀不升曰康五穀不升曰饑生於豐年之狼戾乎念及此幾欲量腹而食數米而炊矣勞擾眾生君子之爲治也官府若無吏亭落若無民閭里不訟於巷老幼不愁於庭府庭郵驛無夜行之吏鄉閭無夜召之征犬不夜吠烏不夜鳴在朝者忠於君在家者孝於親皆見陸賈新書嗚呼仁哉漢書若小人之在上也如寢關暴纊不得須臾甯淮南子豈知水濁則無掉尾之魚政苛則無逸樂之人故令煩則民詐政擾則民不定叶平不治其本而務其末譬如拯溺錘之以石救火投之以薪皆見鄧析子破人之家取其財寶眞誥言郗回父郗方回父鑒也無辜戮人百口取其財寶殃考深重怨主恒訟天曹早已申對回法應滅門但其修德旣重一身免脫子孫豈得全耶回當保其天年但仙道之事去之遠矣夫以郗道徽之賢一事不方幅南史猶䝉冢訟爲冡中人所訟出眞誥况其下焉者乎決水放火以害民居老君說百病曰水火敗傷是一病水能反壤漢書火可燎原失則爲災蹈之者死是以漢魏入毁亡之律晉書刑法志帝王巖決放之條若夫開積水於萬仞烈猛火於積薪抱朴子非奸吏盜以營私卽仇家藉之洩忿漂民居之室其傷必多焚旅人之巢爲禍甚烈夫夫也雖投𢌿河伯南史謝超宗語焚居平莊左傳非過也紊亂規模以敗人功損人器物以窮人用君子不壞舊防禮大人必矜細行書東靑齊之畝難言物土之宜毁重邱之瓶未免閉門之訽左傳是知法不易常怨不在大唯有禮者可以免見他榮貴願他流貶見他富有願他破散名位相軋也貨財相傾也獸惡其網民怨其上國語自然之理雖然達而在位豈非稽古之榮桓榮賢而多財漢書乃是善人之賞論語左傳若曠貴不久漢書出自天公奸富致殃史記左傳何干卿事南唐書設虛願而幸人災虛願出周書及戰國策非愚則惑也見他美色起心私之貪色爲淫淫爲大罰左傳見色而說謂之曰逆韓詩外傳慶封易内負之斧鉞巫臣竊妻罪至族赤私於庚宗叔孫不食皆見左傳淫於魯宫邾顏伏鑕公羊傳申池之禍賊由閻職子貉之妹終喪羊舌左傳嗚呼今人宜鑒斯轍天有六氣降生六疾左傳亂自女戎晉語女爲陽物晦時生蠱日入作慝夭年喪志非鬼非食人生實難皆見左傳受之以節易左傳淸心窒慾附遠厚別禮逸則忘善愆則有辟魯語送目冶容左傳易授情國色晉獻事見晉語及公羊惟厲之階詩惟家之索書索音色嫠有先夫左傳季誠弱息漢書不以義交尚書大傳是爲惑溺公卿宣淫兄弟爭室烝報姘通上淫曰烝旁淫曰通淫親族之妻曰報與妻婢交曰姘見左傳及漢律罪大惡積易生不若死公羊死有餘責漢書嗚呼上天戰國策天威咫尺福仁禍淫左傳不爽杪忽遠則子孫近在目睫淫而無罰左傳未聞其說負他貨財願他身死平時匱乏仰升斗之水則活是貸我以財者乃緩我以死者也惠孰大焉惡人而欲其死是惑也負人而欲其死是賊也賊人者天必反賊之千求不遂便生呪恨先軰言自家猶不能自快自家如何他人却能盡快吾意交富人而與之稱貸交貴人而丏其竿牘恒人之所賤也安能望其必遂欲不足而忿售謂之小人不亦宜乎見他失便便說他過人偶失便或值於時或嗇於數未必皆其自取也若不揆其素行而轍指其生平以爲是固應爾也豈不悖哉且人卽有過得志則括囊失時則橫議亦有識者所深鄙也見他體相不具而笑之戚施不可使仰籧篨不可使俯晉語天刑之也莊子天刑之爲不幸人笑之爲不仁且踊棓而闚踊上棓猶今之樓閣蕭同幾於作質公羊登樓而笑愛妾遂喪其元史記豈計之得哉見他才能可稱而抑之人有才能卽未嘗識面猶當題拂而揚詡之况目驗而心知者耶穀梁子曰心志旣通而名譽不聞友之罪也名譽卽聞有司不舉有司之罪也然則知柳下之賢乏禰衡之薦誰之罪歟埋蠱厭人老君說百病曰蠱道厭人是一病蠱者損壞之名淫溺惑亂之所生也左傳古訓爲事易有蠱卦謂壞極而有事也於文皿蟲爲蠱左傳先儒謂蟲食器皿巫行邪術損壞於人故亦謂之蠱禮記正義其法以桐木人以鍼剌之埋之地以厭人人輒死漢書注卽周書所謂左道也周書曰以左道事君者誅鄭康成注王制曰左道若巫蠱及俗禁漢時巫蠱之禍最烈故賊律有云漢律賊篇敢蠱人卽教令者弃市延及後世蠱人之罪並編十惡句本風俗通赦令所不宥法至重矣而其術不衰乃知少皞之亂家爲巫史楚詞宋襄之覇鬼有淫昏左傳召之而至又何尤焉小爾疋曰尤怪也聖王在上分民神職司民司神之職絶地天通尚書楚語此嘉祥所以日降蠱氣所以不作也用藥殺樹風咏甘棠雅歌行葦楚楚可憐之樹晉書濯濯易盡之枝皆當廣以慈心全其生意况叢亡七日未必非神戰國策櫟大百圍偏能見夢也莊子用藥者無斧斤而夭厥志不仁不斬伐而枯其毒太苦恚怒師傅雲笈七籖老君曰怒恚師傅大不祥師無當於五服然左右就養有父道焉服勤至死有君道焉故欒共子曰民生於三事之如一也漢重經師其上章也必稱聞諸師曰以明所受戰國策曰談語而不稱師是倍也荀子曰言而不稱師謂之倍教而不稱師謂之畔於其死也則必自表師喪弃官行服見兩漢書故經義莫明於漢人材亦莫盛於漢自經師亡經師亡於東晉而古學亦亡唐宋元以後至不能識古文而仲山之古訓不存詩古訓是式亦作詁訓見說文夫子之雅言亦絶雅正也康成註論語曰讀先王典法必正言其音然後義全家君謂學者不識字不能通經也於是有施悖求佛而疾其師者矣有燕朋燕辟而逆其師者矣唐石經禮記義見鄭氏注荀卿言倍師之人明君不納諸朝士大夫不與之言葢師道不立則經義不明經義不明人材所以日下也抵觸父兄武王勝殷得二虜而問焉曰而國有妖乎一虜曰晝見星而兩血此吾國之妖也一虜曰此非其大者吾國之妖其大者子不聽父弟不聽兄此妖之大者新序夫驕子傲弟其教不先其率不謹史記輕簡父母賈誼新書淩忽長者顏氏家訓小則兆門衣乍之衰大則貽風俗之患雖欲不謂之妖而不得也强取强求好侵好奪市金可探取之傷廉白珩非寶求之有道侵欲崇侈饕餮乃爾奪攘矯虔蚩一尤殱旃窮途思返違道不遠靜言自悼從我所好虜掠致富本富爲上末富次之姦富最下攻剽椎埋掘冡鑄弊意錢搏揜而曲叔以之起桓發用以饒貨殖傳皆姦富也雖然善人富謂之賞淫人富謂之殃左傳是故家有不宜之財則傷戰國策掘藏之家其後必亡淮南子天殆富淫人左傳此說誠荒唐也韓昌黎詩桃源之說誠荒唐巧詐求遷馬安巧宦而四至九卿漢書漢官儀翟酺詐懿而先據要路孫懿也見范書贊倖進之端開純臣之節墮矣何以謹愼爲欺謾居右職何以禮儀爲便巧爲尊官賈誼貢禹今人之所喜者昔人之所歎也且也舐痔而結駟趙壹語本莊子何辱如之遭睡而探珠莊子其危甚矣賞罰不平古者爵賞不踰德刑罰不過罪是以爲善者勸而不善者沮荀子惟其平也如賞所愛而罰所惡范睢語則不平不平則怨怨則爭爭則勸懲不立而爵賞刑罰窮矣禮逸樂過節益戒舜曰罔遊於逸罔淫於樂故君子無逸作所書良士好樂無荒詩乃逸乃諺周公所以詠歎也式號式呼大雅所以流連也漢書且吾聞之狂者無憂淮南子溺人必笑左傳逸樂未終而死亡繼之亦何以異於是乎苛虐其下天有十日人有十等左傳下所以事上上所以使下也鞭朴施於家庭固爲終吝僮僕取其遲鈍無可深求苛虐者重爲任苛而罰不勝虐遠其塗苛而誅不至虐夫力不足則僞智不足則欺皆見莊子鳥窮則啄獸窮則齧人窮則詐韓詩外傳自古及今未有窮其下而不危者也家語恐赫於他失羣之鴈故瘡末息虛弓可以下之戰國策在患之人在患出晉語驚魂未定浮言可以動之書葢百端恐怖强者股弁二字出漢書弱者引決豈不痛哉按以周刑應在造言之律周禮鄉八刑稽之漢法當依恐猲之條漢盜律有恐猲見王子侯表及晉書刑法志怨天尤人人之受於天也有三命焉受命以保度受命謂年夀遭命以摘暴遭命謂行善而遇凶隨命以督行隨命謂隨其善惡而報之見孝經援神契及何休針膏盲君子之於人也有三自反焉自反而仁矣自反而有禮矣自反而忠矣三命皆天也三自反皆不求諸人也故荀子曰自知者不怨人知命者不怨天怨人者窮怨天者無志訶風罵雨老君說百病曰罵詈風雨是一病天有風雨霜露無非教也禮飌古文風師雨師帝王之所祀周禮好風好雨日月之所從鄭氏謂曰從星不可見明日亦從星帝天且弗違之而况於人乎咨祁寒而怨暑雨乃黔首之無知訟風伯而詰雨師實文人之游戲曹子建詰咎文假天帝之命以詰風伯雨師韓昌黎訟風伯本此有識者蹈之是獲罪於天也鬬合爭訟持兵曰鬬眾鬬曰合私爭曰爭鳴於官曰訟鬬而不勝集眾以要之傷必重爭而不已速訟以成之室必殘案漢律鬬有保辜辜外以傷人論辜内以殺人論本何休公羊注史游急就章功意所必辨也手傷人爲功使人行傷人爲意見漢書周官訟有明禁旣入之以束矢又申之以鈞金曲直所必分也功意辨而曲直分彼好鬬建訟之徒亦何所措其手足乎妄逐朋黨東漢之末京師遊士汝南范滂等非訐朝政自公卿以下皆折節下之太學生爭慕其風以爲文學將興處士復用陳留申屠蟠獨歎曰昔戰國之世處士橫議列國之君至爲擁篲先驅卒有阬儒燒書之禍今之謂矣乃絶跡梁碭之間因樹爲屋自同傭人居二年滂等果罹黨錮或死或刑者數百人蟠確然免於疑論周易泰之九二曰朋亡得尚於中行渙之六四曰渙其羣元吉孔子作小象皆以光大言之光大者周而不比公爾忘私之謂也夫洪範九田夀必嚴比德周官八成用戒邦朋則朋黨之禁其來久矣迹哲士之徵言攷先聖之逸典乃知有黨必有讐左傳喪朋終獲慶易非知幾達節之人大雅不羣之彥其孰能與於此哉用妻妾語違父母訓髮子不笞束髮受書之子冠子不言韓詩外傳慈訓不易聞也袖中之簡三嵗可以出之趙簡子之長子曰伯魯幼子曰無恤嘗書訓誡之詞於二簡以授二子曰謹識之三年而問之伯魯不能舉其詞求其簡已失之矣問無恤誦其詞甚習求其簡出諸袖中而奏之於是簡子以無恤爲賢古詩置書懷袖中三嵗字不滅千里之書終身可以誦之馬文淵千里還書誡其兄子見後漢書及王充論衡何愛敬之深篤而勿逆勿怠也禮雖然妻子具而孝始衰矣句本管子荀子讒言興而階之厲矣夫必先用其婦言今文泰誓乃敢侮厥父母無佚於是一轉瞬而姑婦勃谿音奚者有之莊子不移時而父子異部者有之三國志此其無行義之尤漢書所謂維弔茲不于我政人得罪天維與我民彝大泯亂者矣康誥得新忘故貴易交富易妻此人情之不美荀子非有道之宜言也衣莫若新人莫若故晏子貴如光武猶思瀨下之賢富若孝宣尚索微時之劒若乃公孫懷詐莫遇故人西京雜記司馬褊心重憎老物晉書其與少原之婦悲悼亡簪韓詩外傳晉國之臣興嗟弃席者淮南子不可同年而語明矣口是心非雲笈七籖曰道教五戒三者不得口是心非口能言之身能行之國寶也口不能言身能行之國器也如器物雖不言而有行也口能言之身不能行國用也賴其言可用口言善身行惡國妖也治國者敬其寶愛其器任其用除其妖荀子貪冒於財欺罔其上季文子相三君無衣帛之妾無食粟之馬君子以爲忠諸葛武侯自表云臣死之日不使内有餘帛外有贏財以負陛下夫廉不過人臣之一節而左氏稱之爲忠孔明自謂無負誠以人臣之欺君誤國必自貪於貨賂始也臨下乃與盜跖爲伍陳情則以曾史自居偷兒獲廉名誠計之得矣豈知高后降之弗祥盤庚民人生其怨詛其究也乃與國而同敗耶日知錄管子曰家富而國貧爲人臣者之大罪也造作惡語讒毁平人鳥之美羽勾啄者鳥畏之魚之哆口垂腴者魚畏之人之利口贍辭者人畏之是以君子避三端韓詩外傳筆端之文成是貝錦詩舌端之語猾以齒牙晉語誣毁生人名節墮地無餘如彼糾彈同之禁錮晉書武士鋒端方之蔑范書贊毁人稱直罵神稱正直者不毁正者唯神吹毛索疵流聞不誼不可爲直漢書投龜詬天中無敬心不可爲正左傳展禽有言犯人道者不祥犯鬼道者有殃魯語毁人誣神其不祥莫大焉天將殃之也弃順效逆背親向疎二者之義備於石碏之諫莊公孔子之教曾子也碏之言曰君義臣行父慈子孝兄愛弟敬所謂六順也賤妨貴少陵長遠間親新間舊小加大淫破義所謂六逆也去順效逆所以速禍也子之言曰不愛其親而愛他人者謂之悖德不敬其親而敬他人者謂之悖禮以順則逆民無則焉不在於善而皆在於凶德也指天地以證鄙懷引神明而鑑猥事古者天道不通民神異業楚語所以防戲豫而絶矯誣也曰明曰旦奉而不違曰覡音篾曰巫敬而不瀆葢天地至尊神明至正尊不親小事穀梁正不干邪僻鄭莊公之誓黃泉能無後悔左傳中里徼之盟齊社莫挽前愆墨子夫至天神不蠲其爲蠲音圭潔也斯乃民庶莫盡其氣受命之氣也見楚語九黎三苖非前轍乎施與後悔老君說百病曰施人望報是一病與人追悔是一病太上貴德其次務施報是施固爲報地也將欲取之必姑與之逸周書是與乃爲取計也往而不來贈而不荅未有不悔其過施而濫與者語曰其就義若𤍠則其去義若渴莊子此之謂也假借不還老君說百病曰借不念還是一病泉府之法凡賖祭祀無過旬日喪紀無過三月泉府職漢元以來有假借不廉之條著於雜律漢律雜篇見晉書刑法志孝文三年河陽侯陳信坐不償人債過六月免功臣表王府亦言永平時明帝諸侯負債輒有削黜之罰潛夫論葢漢尚廉恥故舉士曰孝廉舉吏曰廉平所以重廉也重廉則必罰不廉且假而不返不特傷廉近於無恥廉恥不立風俗日偷啟爭速訟爭財日訟猶其細也分外營求子臣弟友分内之事也富貴利達分外之事也君子畢力於人倫故思不出位而行無越思左傳小人罔識義命不能耕而欲黍粱不能織而喜釆裳淮南子虧其分内之事而營其分外之求豈知所性不存而所求無益乎力上施設此爲守錢虜一軰言之持心計權子錢治產積居俯拾仰取趨時若猛獸之發得利如鳥鵲之爭此有知盡能索耳終不餘力而讓財矣史記然而識者嫌其銅臭崔烈天下謂之膏肓三衍實士君子所羞稱也淫欲過度國風之好色也盈其欲不愆其止荀子葢陽性純而能施陰體順而能化以禮濟樂以穀伏蠱故能豐子孫之祥致老夀之福荀爽對策以穀伏蠱見晉語若夫不節不時左傳失儀失度燕好每形於動靜漢書晦明常失於節宣左傳非尤物之移人卽冶容之喪志且也茲心不爽左傳夀命不究於高年杜欽語其生不蕃左傳肌膚莫傳於來體蔚宗贊謂無子嗣思之能無動念言之可爲寒心此三戒之所先十愆之必儆也心毒貌慈面狠不害心狠敗國晉語酷虐用刑垂涕終無所活曹瞞置人死地柔懦不異平時盛章尹京何中之惡而外之婉乎乃知梟䲭不鳴要非祥也豺狼不噬要非仁也張文潛語有王者起屏諸遠方禮投諸四裔左傳可也穢食餧人盃多漬酒之蠅匹夫爲之弗飮淮南子飯有涉筐之鼠君子所以不嘗論衡昔人以食不潔爲膓洿論衡誠憎之也况以之餧人乎餧之言飼也玉篇如以莝豆飼馬牛賤之甚矣此人之陰過天之大惡也論衡左道惑眾盧子幹注禮曰左道謂邪道地道尊右右爲貴故漢書云右賢左愚右貴左賤故正道爲右不正道爲左禮記正義僻左之道以之事君則誅逸周書以之亂政則殺王制若夫疑眾在四誅之條假於鬼神時日卜筮以疑眾殺王制之所不聽當罪則決不聽其辭亂民居八刑之次周官之所必糾司徒鄉八刑糾萬民一曰亂民之刑鄭注謂左道此皆不待天誅而自罹國法者也短尺狹度輕秤小升以譌雜眞採取姦利周官之法同其度量度丈尺量斗斛壹其湻制湻與純同音準湻謂幅廣制謂匹長察其詐僞飾行儥與賣同慝者而誅罰之質人胥師職法至重也賈而欲盈左傳物無中度禮人而近市左傳勢必假眞法言夫欲售僞者必假眞以此獲利則爲姦利以此致富則爲姦富此商賈所不齒莊子乞人所不屑也壓良爲賤因貧而作贅子見賈誼傳如湻曰淮南俗賣子與人作奴婢者名爲贅子情已堪憐從坐而入縣官見後鄭周禮注漢律罪人妻子沒爲奴婢法誠難逭若家本良奥二字出禮記注系屬衣冠兩漢書或乘機而攫取或依勢而脅從視若人奴史記役同餓隸漢豈不聞畧人之法在漢律盜篇定自漢朝見後漢紀和賣之條彰於魏世後漢書盜律和賣人爲奴婢者死自昔稱嚴於今爲烈雖旅之瑣瑣斯其取災斯厮役恐震之蘇蘇僕將自喪也旅九三王弻謂次焚僕喪而身危謾驀愚人謾欺也音莫官反驀音莫白反說文云上馬也龍龕手鑑云踰也謾者詭而䝉之驀者陵而上之愚人胸無識故可謾生無才故可驀雖然以有識謾無識以有才驀無才是伎力皆害器矣劉晝語不仁孰甚焉貪婪無厭婪亦貪也返厫倉者不爲之多飮臨江河者不爲之多飮期滿腹而已淮南子咎莫大於欲得禍莫大於不知足老子谿壑可盈而心不可饜晉語此何異周鼎之鑄饕餮食人未咽而害及其身也呂覽呪詛求直呪者呪來禍也詛者詛往愆也呪則口吿詛則用牲古者司盟掌其事蘇成遇暴辛之讒則出三物以自詛詩屈原遭子蘭之謗則吿五帝以折中楚詞枉結思申煩𡨚求理惟其直也若乃言多僭嫚左傳事近矯誣國語詎可吿彼司盟周禮呵之楚壁天問中理之辭未半墨卒隕其身左傳三苖之信罔中無世在下呂刑葢未直而求直適足握水宫之筆鳴三官之皷耳北帝主六天官二天宫立一官六天凡立爲三官三官如今刑名之職主諸考謫而消魔經云岱宗又有左火官右水官及女官亦名三官並主考罰今三茅君通掌之並見眞誥也嗜酒悖亂古之人制酒醴幾萍氏立監史將以德維令儀辭不腆稱須臾規初筵在剛斷過三爵不及亂今之人乃酒荒儀不令德不將濡其首側我弁旣怭怭復僊僊扉有桷門有莠齊慶封鄭伯有就壑谷奔雍梁遷内實殱朱方吿爾士無崇飮百日醉三日醒酒旣入舌必出舌旣出言必失失爾言弃爾身由歡伯由賢人堯千鍾路百榼惟齊聖能温克酒入舌出語見管子歡伯見易林賢人見晉書骨肉忿爭父子不和其世破亡兄弟不和不能久同夫妻不和家室大凶說苑蟲有蚘者一身兩口爭相齕遂相食因自殺今之薄於骨肉者皆蚘類也韓非子男不忠良女不柔順不和其室不敬其夫每好矜誇常行妒忌無行於妻子失禮於舅姑男正乎外女正乎内夫和妻柔姑慈婦聽此天地之大義制禮之善物也易左傳有如脫輹之輿不能正室幾望平之月戒在征凶易或矜此婦人而宫中絶脰或夫人不僂疾也而國外稽留公羊傳刑于之化無聞併倨之風屢見遺禮義弃人倫其不同禽獸者無幾耳漢書輕慢先靈君子生則敬養死則敬享致愛則存致慤則著著存不忘乎心夫安得不敬乎是以祭則受福禮孝能錫類詩若夫薦而矯誣立而跛踦類公索之亡牲家語近殷民之攘竊書豈惟鬼神不饗兼之孤疾夭昏左傳皆僭慢之所致也違逆上命惟天子受命於天士受命於君故君命順則臣有順命君命逆則臣有逆命表記雖然逆命而利君謂之忠逆命而不利君謂之簒荀子稱詔書而不用漢律漢書空留掛壁之文崔實政論格上令而弗行遂有屯膏之事咈哉方命之鯀至於用刑左傳蠢茲逆命之苖乃絶厥世書作爲無益書曰不作無益害有益作者創造之詞無益多矣不可徧舉爲事有所害故爲無益書正義作淫巧以蕩上心豈惟喪德咈百姓以從己欲書不獨傷財葢作無益未有不害有益也懷挾外心策名筮仕精白所以承休巾櫛事人靡他用以自矢臣無畔質晉語婦内夫家漢書而外其心其何貳如之左傳行姦禮於隣主卻至下臣何敢卽安國語左傳學積聚於衞人韓非子子婦豈容私貨禮禮有放臣詩稱弃婦良有以也自呪呪他指九天以爲正悵望靈修出三物以明心咨嗟維暴騷人顑頷而何傷小雅怨誹而不亂也若遇人不淑涕泗滂沱覯閔旣多寤言摽辟冀余身之有悔公羊願及汝而偕亡書祇加懟耳史記唯女子與小人爲難養也其謂是乎偏憎偏愛李傳主後妻其母惡者其子釋釋音籜與惡韻其母好者其子抱韓非子丈夫之愛憎生自婦人也豈無芒茆之妻情親假子珠崖之義哀感傍人列女傳亦各其志耳漢書然而佩申生之玦已見集枯晉語牽孺子之牛齊景何妨折齒左傳是則偏之爲害而家之所以不齊也越井越竈雲笈七籖雜戒忌曰勿跂井今古大忌又曰婦人勿跂竈坐大忌吹簫之女載於白澤之圖白澤圖曰井神曰吹簫女子白澤圖黃帝時書段成式據太眞科經云井鬼名瓊老婦之盆出於淹中之記古禮出於淹中故耿恭再拜而井水飛揚後漢書陰氏晨炊而竈神形見同上神明之也禮越之者有短垣而自踰之國語如陳侯之忘大德鄭國井堙左傳豈智伯之甚不仁晉陽沉竈晉語赤眉無道宜折箠以笞之赤眉溺社稷汙井竈童子何知當執戈而逐之也士匄日塞井夷竈文子執戈逐之曰童子何知也跳食跳人惟食八政之首惟人萬物之靈書故春秋必記有年君子不誣十室鄭氏禮注重之故也若夫暴殄爲心狎侮自用旣蹴爾於一簞復屈人於兩胯呼首山之庚癸左傳安知稼穡之維艱見兄弟之顚連西銘豈識一夫之予勝若小人也足與治乎漢書損子墮胎人道下生通於易氣易氣從下生故畫卦自下而上胎育亦然誕彌值㝛應於天文抱朴子曰命之修短實由所值受氣結胎各有星㝛在母不憂晉語肇始揆於皇覽離騷先生如羍俗作達懼弗子於庚辰父不愛子謂之不子義見漢學天地父母之心其理同其情一也孩蟲有禁孟春猶重其文月令刳剔用刑書君子諱傷其類家語矧自殘其骨肉乎後漢書豈生有咎徵而必弃諸隄下或合而非禮以致委諸夢中左傳不然何用心逆人道也漢書多行隱僻今本作行多爲不善於顯明之中者人得而誅之爲不善於幽暗之中者鬼得而誅之莊子故不由明坦之途者謂之宵人郭象注宵人之心險於山川難於知天莊子隱僻乃其性也以隱僻爲性則不義以隱僻爲行則無禮多行不義必自斃多行無禮必自及也左傳晦臘歌舞朔旦號怒杜預左傳注曰晦月終陰之盡故以爲忌雲笈七籖曰臘日宜修齋祭祀先祖金書仙誌戒曰勿以月朔日怒恚禁忌篇曰旦起勿嗔恚旦下床勿叱呼勿惡言皆見雲笈七籖夫喜怒以類者鮮矣易者實多左傳晦臘爲終朔旦爲始吉人由之視履君子於是履端王志長豈溢喜溢怒之時乎狂者非不歌也淮南子醉者非不怒也魯語然而死亡疾病隨之矣哀樂失時者殃咎安得而不至耶左傳對北唾涕及溺奴弔反對竈吟咏及哭雲笈七籖禁忌篇曰凡人不可北向唾北向尿又靑律戒曰不得北向便溺觸忤玉晨老君曰向竈罵詈三不祥禁忌篇曰勿舉足向火對竈罵勿咨嗟呼奈何聲此名請禍特忌之又以竈火燒香穢柴作食以夫遂取火於日周禮蕭爇用升禮䆃一莖六穗於庖封禪書吉蠲音圭爲熾詩故火禁掌於司烜周禮薪蒸守諸虞人左傳古人之所愼也臭陽達於墻屋禮豈容穢得腥聞書玉食薦於君王尚惡勞薪作爨晉書大則鬼神弗饗小則賔客不歡皆不敬之所致也夜起裸露雲笈七籖說戒篇曰天尊十戒第八戒不得裸露三光當終身奉持老君曰夜起裸形一不祥古人處必掩身禮卧必拱手南史故武王帶之銘曰火滅修容愼戒必恭恭則夀大戴禮露而觸三光則不恭裸而冒風露則不夀可於向晦宴息而忽之乎八節行刑雲笈七籖曰八節日立春春分立夏夏至立秋秋分立冬冬至眞誥協昌期曰八節之日當齋戒謀諸善事以營於道之方也愼不可以其日忿爭喜怒及行威刑皆天人大忌爲重罪也雲笈七籖曰凡八節之日是上天八會大慶之日也金書仙誌誡曰勿以八節日行威刑葢順時之法後漢書五者所遵賊莽春夏斫人亡新由是忽焉王莽傳建安寛緩詔絶後漢立春下寛大詔書罪非殊死一切勿案建安二十二年二月立春寛緩詔書不行見獻帝起居注漢室由是衰焉若刑不須時是謂變天之道絶地之理亂人之紀必有天殃者也唾流星指虹蜺蜺音齧天事恒象國語左傳失度爲飛流張宴曰飛星流星也孟康曰飛絶迹而去也流光迹相連二氣爲虹蜺淮南子曰天一氣則成虹敬天之渝無敢馳驅詩况敢唾而指之乎追誦蝃蝀之章以爲太息輒指三光久視日月雲笈七籖養生延命錄曰凡小兒不用令指月兩耳後生瘡名月食瘡又曰勿怒目久視日月使目睛失明天有三辰地有五行日合於天統月合於地統斗合於人統五星合之於五行三統厯故王者父天母地兄日姊月孝經緯類于上帝宜于社禮禋于六宗書精意以享周語敬之至也不敬三光是不敬天地也河圖帝視萌曰帝視萌河圖篇名侮天地者凶可不懼乎春月燎獵爾雅宵田爲燎郭氏謂夜獵載鑪照也蔡邕月令章句曰獵者捷取之名也昆蟲未蟄王制有火田之禁禮弋不射㝛聖人垂愛物之心蒐不以時曰傷天和田不以禮曰暴天物禮燎獵畢弋管子所謂無道之君也四稱篇甯於物也而可忽諸對北惡罵雲笈七籖禁忌篇曰凡人勿北向唾罵犯魁罡神金書仙誌戒曰勿向北唾罵犯破毁王破謂嵗下辰也王謂王炁之所在也無故殺龜打音頂擊也蛇雲笈七籖禁忌篇曰大凡一切翾飛蠢動不可故殺傷損至於龜蛇異於他族殺有靈者或陰精害人深當愼之之二蟲者居於宰路淵名龜所居見莊子出自泉宮左傳南龜卻而東龜前周禮内蛇鬬而外蛇死左傳皆能通元王而見夢龜策列傳負涸澤而爲神韓非子倘屬異十朋易爾疋橫遭刳剝莊子史記類非岐首輒見椎埋列女傳豈仁人君子之用心乎孔瑜之功章於鑄印會稽後賢傳隋侯之德報在銜珠搜神記竊謂作不善者反是如是等罪司命隨其輕重奪其紀算算盡則死春秋緯佐助期曰司命神名滅黨長八尺小鼻望羊多髭癯瘦通於命運期度後漢書張衡傳注風俗通曰今民間祀司命刻木長尺二寸爲人像行者擔篋中居則作小屋汝南餘郡亦多有皆祀以腊率以春秋之月曲禮曰君子曰終小人曰死鄭氏曰死之言澌也事卒爲終消盡爲澌言算與形骸俱盡也死有餘責乃殃及子孫易文言曰積不善之家必有餘殃虞仲翔據納甲卦氣之說而申之曰坤積不善以乾通坤極姤生㢲爲餘殃陽極姤生履霜堅氷猖蹷而活先人餘烈貞良而亡先人餘殃說苑天之道也抱朴子據道戒曰若乃憎善好殺口是心非背向異辭反戾直正虐害其下欺罔其上叛其所事受恩不感弄法受賂縱曲枉直廢公爲私刑加無辜破人之家收人之寶害人之身取人之位侵剋賢者誅戮降伏謗訕聖賢傷殘道士彈射飛鳥刳胎破卵春夏燎獵詈罵神靈教人爲惡蔽人之善危人自安佻人自功壞人佳事奪人所愛離人骨肉辱人求勝取人長錢還人短陌決放水火以術害人迫脇尫弱以惡易好强取强求擄掠致富不公不平淫佚傾斜淩孤暴寡拾遺取施欺僞誑詐好說人私持人短長牽天援地詋詛求直假借不還換貸不償求欲無已憎拒忠信不順上命不敬所師笑人作善敗人苖稼損人器物以窮人困當作用以不淸潔飮飼他人輕秤小升狹幅短度以僞雜眞採取姦利誘人取物越井跨竈晦歌朔哭凡有一事輒是一罪隨事輕重司命奪其算紀算盡則死但有惡心而無惡迹者奪算若惡事而損於人者奪紀若算紀未盡而自死者皆殃及子孫也又諸橫取人財者乃計其妻子家口以當之漸至死喪若不死喪則有水火盜賊遺亡器物疾病口舌諸事以當妄取之直抱朴子據道戒曰諸橫奪人財物者或計其妻子家口當塡之以致死喪但不卽至耳其惡行若不足以煞其家人者久久終遭水火劫盜及遺失器物或遇縣官疾病自營醫藥烹牲祭祀所用之費要當令足以盡其取之者也又枉殺人者是易刀兵而相殺也孟子所謂一間公羊所謂推刃也取非義之財者譬如漏脯救饑鴆酒止渴非不暫飽死亦及之抱朴子據道戒曰道家言枉殺人者是以兵刃而更相殺其取非義之財不避怨恨譬若以漏脯救饑鴆酒解渴非不暫飽而死亦及之又良規篇曰無異乎渴者之資口於雲日之酒饑者之取飽於鬱肉漏脯也雲日卽運日鴆鳥也夫心起於善善雖未爲而吉神已隨之或心起於惡惡雖未爲而凶神已隨之老君曰無謂幽冥天知人情無謂闇昧神見人形心言小語鬼聞人聲犯禁滿千地收人形養性延命錄曾子曰人而好善福雖未至禍其遠矣人而不好善禍雖未至福其遠矣徐幹中論關尹子曰心蔽吉凶者靈鬼攝之心蔽男女者淫鬼攝之心蔽幽憂者沉鬼攝之心蔽放逸者狂鬼攝之心蔽盟詛者異鬼攝之心蔽藥餌者物鬼攝之彼以其精此以其精兩精相搏則神應之久之或死木或死金或死繩或死井葢神體物而不遺心隨感而輒動吉凶善惡之間可不愼哉其有曾行惡事後自改悔諸惡莫作眾善奉行久久必獲吉慶所謂轉禍爲福也轉禍爲福戰國策文抱朴子據道戒曰及其有曾行諸惡事後自改悔者若曾枉煞人則當思救濟應死之人以解之若妄取人財物則當思施與貧乏人以解之太平廣記九十六卷引酉陽雜爼曰釋道欽住陘山有問道者率爾而對皆造宗極劉忠州晏常乞心偈令執罏而聽再三稱諸惡莫作眾善奉行晏曰此三尺童子皆知之欽曰三尺童子皆知之百嵗老人行不得至今以爲名理夫人有禍則心畏恐心畏恐則行端直行端直則思慮熟思慮熟則得事理行端直則無禍害無禍害則盡天年得事理則必成功盡天年則全而夀必成功則富與貴全夀福之謂福而福本於有禍韓非子易曰不遠復旡祇悔元吉此之謂也故吉人語善視善行善一日有三善三年天必降之福凶人語惡視惡行惡一日有三惡天必降之禍胡不勉而行之吉人惟善惟日不足凶人爲不善亦惟日不足書視聽言皆動是也善無近福抱朴子故以三年爲斷惡不言三年者凶人不終禍之至也何日之有皆見左專末復言此勉人及時遷善改過也
