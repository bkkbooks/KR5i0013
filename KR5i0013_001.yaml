front:
  text: 太上感應篇箋注太上感應篇序漢眞人魏伯陽著參同契荀爽虞翻干寶諸儒采以注易後之言易者未能或之先也蓋魏晉以前道家之學未嘗不原本聖人惟是聖人贊化育以天地萬物爲坎離道家鍊精魄以一身爲坎離爲較異耳然玉鈐經言求仙者必以忠孝友悌仁信爲本故道藏有太上感應篇一卷卽抱朴子所述漢世道戒皆君子持已立身之學其中如三台北斗司命竈神之屬證諸經傳無不契合勸善之書稱爲最古自此以下無譏焉雍正之初先慈抱病不肖棟日夜嘗藥又禱於神發願注感應篇以祈母疾天誘其衷母疾有間因念此書感應之速欲公諸同好而未果余友楊君石漁見之歎曰此書得此注不惟可以勸善且使後世道家知魏晉以前求仙之本初未嘗有悖於聖人反而求之忠孝友悌仁信之間而致力焉是亦聖人之徒也其諸君子亦有樂於是歟旣鋟諸版而問序於余余嘉楊君之好善因述注書之由起而爲之序己巳冬日東吳惠棟太上感應篇持誦儀則
